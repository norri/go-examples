# Comprehensive Go CI pipeline for the best-practices/ example.
# Demonstrates parallel jobs, supply chain protection, security scanning,
# secret detection, SBOM generation, and a single aggregate gate.
#
# All third-party actions are pinned by commit SHA.

name: best-practices CI

on:
  push:
    branches: [main]
    paths:
      - "best-practices/**"
      - ".github/workflows/best-practices-ci.yml"
  pull_request:
    paths:
      - "best-practices/**"
      - ".github/workflows/best-practices-ci.yml"
  schedule:
    # Weekly run catches newly disclosed CVEs without a code change.
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: best-practices-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: best-practices

jobs:
  # ---------------------------------------------------------------------------
  # 1. Fast hygiene: formatting drift + module hygiene.
  # ---------------------------------------------------------------------------
  hygiene:
    name: fmt + mod hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: best-practices/go.mod
          cache: true
          cache-dependency-path: best-practices/go.sum

      - name: Install formatters
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest

      - name: gofumpt
        run: |
          out=$(gofumpt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofumpt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: goimports
        run: |
          out=$(goimports -l -local github.com/norri/go-examples/best-practices .)
          if [ -n "$out" ]; then
            echo "::error::goimports found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go mod tidy is clean
        run: go mod tidy -diff

      - name: go mod verify
        run: go mod verify

  # ---------------------------------------------------------------------------
  # 2. Static analysis via golangci-lint.
  # ---------------------------------------------------------------------------
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: best-practices/go.mod
          cache: true
          cache-dependency-path: best-practices/go.sum

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          working-directory: best-practices
          # bad/ holds intentionally broken code (see README). Scope to good/.
          args: ./good/...

  # ---------------------------------------------------------------------------
  # 3. Tests with race detector, shuffled order, JUnit + coverage artifacts.
  # ---------------------------------------------------------------------------
  test:
    name: tests (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: best-practices/go.mod
          cache: true
          cache-dependency-path: best-practices/go.sum

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: |
          gotestsum \
            --format pkgname \
            --junitfile junit.xml \
            -- \
            -race \
            -shuffle=on \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./good/...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: junit
          path: best-practices/junit.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage
          path: best-practices/coverage.out

  # ---------------------------------------------------------------------------
  # 4. govulncheck - Go vuln DB scan, call-graph aware (low false positive).
  # ---------------------------------------------------------------------------
  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          work-dir: best-practices/good
          go-version-file: best-practices/go.mod

  # ---------------------------------------------------------------------------
  # 5. gosec - Go security smells, results uploaded as SARIF.
  # ---------------------------------------------------------------------------
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: best-practices/go.mod
          cache: true
          cache-dependency-path: best-practices/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: ${{ github.workspace }}
        run: gosec -no-fail -fmt sarif -out gosec.sarif ./best-practices/good/...

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.27.5
        with:
          sarif_file: gosec.sarif

  # ---------------------------------------------------------------------------
  # 6. Secret scanning - gitleaks across full history.
  # ---------------------------------------------------------------------------
  secrets:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 7. SBOM - Syft generates CycloneDX, Grype scans it.
  # ---------------------------------------------------------------------------
  sbom:
    name: sbom + grype
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: best-practices
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Scan SBOM for vulns
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: high

      - name: Upload SBOM
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom
          path: sbom.cdx.json

  # ---------------------------------------------------------------------------
  # 8. CodeQL - semantic taint analysis. Push/schedule only (expensive).
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.27.5
        with:
          languages: go
      - uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.27.5

  # ---------------------------------------------------------------------------
  # 9. Aggregate gate - branch protection points at this single check.
  # ---------------------------------------------------------------------------
  ci:
    name: ci
    if: always()
    needs: [hygiene, lint, test, vuln, gosec, secrets, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          echo "$results" | grep -q '"result": "failure"' && exit 1 || true
          echo "$results" | grep -q '"result": "cancelled"' && exit 1 || true
          exit 0
