name: CI test and lint

on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  find-projects:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find-projects.outputs.projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Find Go projects
        id: find-projects
        run: |
          projects=$(find . -type f -name 'go.mod' -exec dirname {} \; | jq -R . | jq -s . | jq -c .)
          echo "projects=$projects" >> $GITHUB_OUTPUT

  test-and-lint:
    needs: find-projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.find-projects.outputs.projects) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.project }}/go.mod
          cache-dependency-path: ${{ matrix.project }}/go.sum
      - name: Run lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          working-directory: ${{ matrix.project }}
      - name: Run tests
        run: |
          echo "Running tests in ${{ matrix.project }}"
          cd ${{ matrix.project }}
          go test ./...
